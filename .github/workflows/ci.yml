name: LWYI CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Install Conan
        uses: conan-io/setup-conan@v1
        with:
          audit_token: ${{ secrets.CONAN_AUDIT_TOKEN }}

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install libclang on ubuntu
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: |
          sudo apt install -y libclang-18-dev
          echo "CLANG_ROOT_DIR=/usr/lib/llvm-18" >> "$GITHUB_ENV"

      - name: Install libclang on windows
        if: ${{ matrix.os == 'windows-latest' }}
        shell: bash
        run: |
          llvmArchive="clang+llvm-18.1.8-x86_64-pc-windows-msvc.tar.xz"
          llvmUrl="https://github.com/llvm/llvm-project/releases/download/llvmorg-18.1.8/$llvmArchive"
          installDir="llvm-18.1.8"
          mkdir $installDir
          curl -o $llvmArchive $llvmUrl
          tar -xf $llvmArchive -C $installDir --strip-components=1
          echo "CLANG_ROOT_DIR=$GITHUB_WORKSPACE/$installDir" >> $GITHUB_ENV

      - name: Conan install
        run: |
          conan install . -s compiler.cppstd=17 -s build_type=Release --build=missing -of build

      - name: Build
        run: |
          cmake -S. -Bbuild -GNinja -DCMAKE_TOOLCHAIN_FILE=./build/conan_build/generators/conan_toolchain.cmake -DCMAKE_BUILD_TYPE=Release -DClang_ROOT="$CLANG_ROOT_DIR"
          cmake --build build

      - name: Run tests
        run: |
          cd build
          ctest --output-on-failure
