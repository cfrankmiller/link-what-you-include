name: LWYI CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, windows-2025, macos-15]

    steps:
      - name: Setup msvc environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Setup Conan
        uses: conan-io/setup-conan@v1
        with:
          audit_token: ${{ secrets.CONAN_AUDIT_TOKEN }}
          cache_packages: true

      - name: Checkout
        uses: actions/checkout@v6

      - name: Conan install
        shell: bash
        run: |
          conan install . -s compiler.cppstd=17 -s build_type=Release --build=missing -of build
          echo "CMAKE_TOOLCHAIN_FILE=$GITHUB_WORKSPACE/build/conan_build/generators/conan_toolchain.cmake" >> $GITHUB_ENV

      - name: Cache clangtooling
        id: cache-clangtooling
        uses: actions/cache@v5
        with:
          path: ./build/llvm
          key: ${{ runner.os }}-output-${{ hashFiles('tools/build_clangtooling.sh') }}

      - name: Build clangtooling
        if: steps.cache-clangtooling.outputs.cache-hit != 'true'
        shell: bash
        run: |
          bash ./tools/build_clangtooling.sh

      - name: Enable clangtooling
        shell: bash
        run: |
          echo "CMAKE_PREFIX_PATH=$GITHUB_WORKSPACE/build/llvm" >> $GITHUB_ENV

      - name: CTest
        shell: ctest -VV -S {0}
        run: |
          set(CTEST_SITE github_workflow)
          set(CTEST_CONFIGURATION_TYPE Release)
          set(CTEST_SOURCE_DIRECTORY ${{ github.workspace }})
          set(CTEST_BINARY_DIRECTORY ${{ github.workspace }}/build)
          set(CTEST_CMAKE_GENERATOR Ninja)
          set(CTEST_BUILD_NAME ${CMAKE_SYSTEM_NAME}.${CTEST_CONFIGURATION_TYPE})

          set(CTEST_TLS_VERIFY OFF)
          
          #find_program(CTEST_COVERAGE_COMMAND NAMES gcov)
          #find_program(CTEST_MEMORYCHECK_COMMAND NAMES valgrind)
          #set(CTEST_MEMORYCHECK_SUPPRESSIONS_FILE ${CTEST_SOURCE_DIRECTORY}/tests/valgrind.supp)
          
          ctest_empty_binary_directory(${CTEST_BINARY_DIRECTORY})
          
          ctest_start(Experimental)
          
          find_package(Git)
          set(CTEST_UPDATE_VERSION_ONLY ON)
          set(CTEST_UPDATE_COMMAND "${GIT_EXECUTABLE}")
          ctest_update(CAPTURE_CMAKE_ERROR result)
          message(":: update result: ${result}")
          
          ctest_configure(CAPTURE_CMAKE_ERROR result)
          message(":: configure result: ${result}")

          ctest_build(CAPTURE_CMAKE_ERROR result)
          message(":: build result: ${result}")

          ctest_test(CAPTURE_CMAKE_ERROR result)
          message(":: test result: ${result}")

          #ctest_coverage()
          #ctest_memcheck()

          ctest_submit(CAPTURE_CMAKE_ERROR result)
          message(":: submit result: ${result}")

      #- name: Build
      #  run: |
      #    cmake -S. -Bbuild -GNinja -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH=build/llvm
      #    cmake --build build

      #- name: Run tests
      #  run: |
      #    ctest --test-dir build --output-on-failure
