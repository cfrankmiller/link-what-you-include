name: Build and test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '42 1 * * *'
      timezone: "America/Los_Angeles"
  workflow_dispatch:

jobs:
  simple_build_and_test:
    if: github.repository == 'cfrankmiller/link-what-you-include' || github.event_name == 'workflow_dispatch'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-26.04, macos-26]

    steps:
      - name: Setup linux environment
        if: runner.os == 'Linux'
        # update README.md if this is changed
        run: |
          sudo apt install clang-18 libclang-18-dev libsimdjson-dev catch2
          echo "Clang_ROOT=/usr/lib/llvm-18" >> $GITHUB_ENV
          echo "CMAKE_GENERATOR=Ninja" >> $GITHUB_ENV

      - name: Setup macos environment
        if: runner.os == 'MacOS'
        # update README.md if this is changed
        run: |
          sudo xcode-select -switch /Library/Developer/CommandLineTools
          brew install llvm@21 llvm@18 catch2 simdjson
          echo "SDKROOT=$(xcrun --show-sdk-path)" >> $GITHUB_ENV
          echo "CXX=$(brew --prefix llvm@21)/bin/clang++" >> $GITHUB_ENV
          echo "CC=$(brew --prefix llvm@21)/bin/clang" >> $GITHUB_ENV
          echo "Clang_ROOT=/opt/homebrew/opt/llvm@18" >> $GITHUB_ENV
          echo "Catch2_ROOT=/opt/homebrew/Cellar/catch2/3.15.1" >> $GITHUB_ENV
          echo "simdjson_ROOT=/opt/homebrew/Cellar/simdjson/4.6.4" >> $GITHUB_ENV
          echo "CMAKE_GENERATOR=Ninja" >> $GITHUB_ENV

     - name: Checkout
        uses: actions/checkout@v6

      - name: Build and test
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug
          cmake --build build 
          ctest --test-dir build 

  full_build_and_test:
    if: github.repository == 'cfrankmiller/link-what-you-include' || github.event_name == 'workflow_dispatch'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, windows-2025-vs2026, macos-26]

    steps:
      - name: Setup windows environment
        if: runner.os == 'Windows'
        uses: TheMrMilchmann/setup-msvc-dev@v4
        with:
          arch: x64

      - name: Setup linux environment
        if: runner.os == 'Linux'
        run: |
          echo "CXX=/usr/bin/g++-14" >> $GITHUB_ENV
          echo "CC=/usr/bin/gcc-14" >> $GITHUB_ENV

      - name: Setup macos environment
        if: runner.os == 'MacOS'
        run: |
          sudo xcode-select -switch /Library/Developer/CommandLineTools
          brew install llvm@21
          echo "SDKROOT=$(xcrun --show-sdk-path)" >> $GITHUB_ENV
          echo "CXX=$(brew --prefix llvm@21)/bin/clang++" >> $GITHUB_ENV
          echo "CC=$(brew --prefix llvm@21)/bin/clang" >> $GITHUB_ENV

      - name: Checkout
        uses: actions/checkout@v6

      - name: Cache 3rdparty
        id: cache-3rdparty
        uses: actions/cache@v5
        with:
          path: ./3rdparty
          key: 3rdparty_${{ matrix.os }}_${{ hashFiles('tools/build_*.sh') }}

      - name: Build 3rdparty
        if: steps.cache-3rdparty.outputs.cache-hit != 'true'
        shell: bash
        run: |
          bash ./tools/build_catch2.sh
          bash ./tools/build_clangtooling.sh
          bash ./tools/build_simdjson.sh

      - name: Enable 3rdparty
        shell: bash
        run: |
          echo "CMAKE_PREFIX_PATH=$GITHUB_WORKSPACE/3rdparty" >> $GITHUB_ENV

      - name: Build and test
        shell: ctest -V -S {0}
        run: |
          include($ENV{GITHUB_WORKSPACE}/.github/workflows/common_ctest.cmake)

          set(CTEST_CONFIGURATION_TYPE Release)
          set(CTEST_SOURCE_DIRECTORY $ENV{GITHUB_WORKSPACE})
          set(CTEST_BINARY_DIRECTORY $ENV{GITHUB_WORKSPACE}/build/release)
          set(CTEST_BUILD_NAME ${CMAKE_SYSTEM_NAME}.${CTEST_CONFIGURATION_TYPE})

          set(model Experimental)
          if($ENV{GITHUB_EVENT_NAME} STREQUAL schedule)
            set(model Nightly)
          endif()

          ctest_start(${model})
          ctest_update()
          ctest_configure()
          ctest_build(RETURN_VALUE result NUMBER_ERRORS errors NUMBER_WARNINGS warnings)
          if(result EQUAL 0)
            ctest_test()
          endif()
          ctest_submit()

          if((NOT result EQUAL 0) OR (errors GREATER 0) OR (warnings GREATER 0))
            message(FATAL_ERROR "Build failed with ${errors} errors and ${warnings} warnings")
          endif()

  tidy:
    if: github.repository == 'cfrankmiller/link-what-you-include' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-26.04
    steps:
      - name: Setup linux environment
        run: |
          sudo apt install clang-18 libclang-18-dev libsimdjson-dev catch2
          echo "Clang_ROOT=/usr/lib/llvm-18" >> $GITHUB_ENV
          echo "CMAKE_GENERATOR=Ninja" >> $GITHUB_ENV

      - name: Checkout
        uses: actions/checkout@v6

      - name: Build with clang-tidy
        shell: ctest -V -S {0}
        run: |
          include($ENV{GITHUB_WORKSPACE}/.github/workflows/common_ctest.cmake)

          set(CTEST_CONFIGURATION_TYPE Release)
          set(CTEST_SOURCE_DIRECTORY $ENV{GITHUB_WORKSPACE})
          set(CTEST_BINARY_DIRECTORY $ENV{GITHUB_WORKSPACE}/build/tidy)
          set(CTEST_BUILD_NAME ${CMAKE_SYSTEM_NAME}.clang-tidy)

          set(model Experimental)
          if($ENV{GITHUB_EVENT_NAME} STREQUAL schedule)
            set(model Nightly)
          endif()

          set(configure_opts
            -DCMAKE_CXX_CLANG_TIDY=clang-tidy
            )

          ctest_start(${model})
          ctest_update()
          ctest_configure(OPTIONS "${configure_opts}")
          ctest_build(NUMBER_ERRORS errors NUMBER_WARNINGS warnings)
          ctest_submit()

          if((errors GREATER 0) OR (warnings GREATER 0))
            message(FATAL_ERROR "Clang-tidy build failed with ${errors} errors and ${warnings} warnings")
          endif()

